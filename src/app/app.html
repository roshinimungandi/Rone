<div class="page-shell">
  <div class="page-bg-shape shape-one" aria-hidden="true"></div>
  <div class="page-bg-shape shape-two" aria-hidden="true"></div>

  <main class="newsroom">
    <app-news-dashboard
      [leadStory]="content.leadStory"
      [spotlightStory]="content.spotlightStory"
      [topHeadlines]="content.topHeadlines"
      [marketTicker]="content.marketTicker"
    />

    <app-news-query (queryChange)="onQueryChange($event)" />

    <section class="content-layout" aria-label="Main content">
      <app-news-feed [sections]="visibleSections" />
      <app-chat-panel [liveUpdates]="content.liveUpdates" [editorPicks]="content.editorPicks" />
    </section>
  </main>

  <!-- Floating chatbot widget — rendered outside <main> so it overlays the full page -->
  <app-news-chatbot />
</div>
