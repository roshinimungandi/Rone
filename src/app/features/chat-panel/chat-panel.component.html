<aside class="panel-stack" aria-label="Live desk and editor picks">
  <section class="panel-card live-card">
    <header>
      <p>Live Desk</p>
      <span class="pulse" aria-hidden="true"></span>
    </header>
    <ul>
      @for (update of liveUpdates; track update) {
        <li>{{ update }}</li>
      }
    </ul>
  </section>

  <section class="panel-card picks-card">
    <header>
      <p>Editors' Picks</p>
    </header>
    <ol>
      @for (pick of editorPicks; track pick) {
        <li>{{ pick }}</li>
      }
    </ol>
  </section>

  <section class="panel-card newsletter-card">
    <header>
      <p>Morning Brief</p>
    </header>
    <p>Get a concise summary of overnight markets and global developments.</p>
    <button type="button">Join Newsletter</button>
  </section>
</aside>
