<section class="query-strip" aria-label="News search and topics">
  <div class="query-row">
    <label class="query-label" for="news-query-input">Find coverage</label>
    <div class="query-input-wrap">
      <input
        #queryInput
        id="news-query-input"
        type="search"
        [value]="query"
        (input)="onQueryInput(queryInput.value)"
        placeholder="Search stories, sectors, and regions"
      />
      @if (query.length > 0) {
        <button type="button" class="clear-btn" (click)="clearQuery()" aria-label="Clear query">Clear</button>
      }
    </div>
  </div>

  <div class="topic-list" role="list">
    @for (topic of ['Markets', 'Energy', 'Technology', 'Policy', 'World']; track topic) {
      <button type="button" role="listitem" class="topic-chip" (click)="applyTopic(topic)">
        {{ topic }}
      </button>
    }
  </div>
</section>
